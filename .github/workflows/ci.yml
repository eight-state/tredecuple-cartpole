name: N13 deterministic one-run proof

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  prove:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run n13-demo
      - run: uv run n13-proof-verify
